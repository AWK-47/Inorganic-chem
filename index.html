    const topics = [

      { id: "halides_h2so4", label: "Halides + H‚āāSO‚āĄ", emoji: "ūüü°", color: "#facc15", dark: "#1c1200" },
      { id: "sulfur", label: "Sulfur / SO‚āā / SO‚āÉ", emoji: "ūüü†", color: "#fb923c", dark: "#1c0a00" },
      { id: "vanadium", label: "Vanadium", emoji: "ūüĒĶ", color: "#60a5fa", dark: "#0c1a2e" },
      { id: "manganese", label: "Manganese", emoji: "ūüü£", color: "#c084fc", dark: "#1a0c2e" },

      { id: "copper", label: "Copper", emoji: "ūüü§", color: "#fb923c", dark: "#1c0a00" },
      { id: "iodine", label: "Iodine / Thiosulfate", emoji: "‚öę", color: "#94a3b8", dark: "#0f172a" },
      { id: "h2o2", label: "H‚āāO‚āā", emoji: "ūüíß", color: "#67e8f9", dark: "#0c1f2e" },
    ];

    const Reaction = ({ equation, oxidised, reduced, obs, note, color }) => (
      <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.09)", borderLeft: `3px solid ${color}`, borderRadius: 8, padding: "14px 18px", marginBottom: 14 }}>

        {(oxidised || reduced) && (
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 6 }}>
            {oxidised && <span style={{ background: "rgba(239,68,68,0.18)", color: "#fca5a5", padding: "2px 10px", borderRadius: 20, fontSize: "0.82em", fontWeight: 600 }}>‚ÜĎ OXIDISED: {oxidised}</span>}
            {reduced && <span style={{ background: "rgba(59,130,246,0.18)", color: "#93c5fd", padding: "2px 10px", borderRadius: 20, fontSize: "0.82em", fontWeight: 600 }}>‚Üď REDUCED: {reduced}</span>}
          </div>
        )}
        {obs && <div style={{ color: "#fde68a", fontSize: "0.85em", marginBottom: 4 }}>ūüĎĀ <b>Observation:</b> {obs}</div>}
        {note && <div style={{ color: "#94a3b8", fontSize: "0.85em", marginTop: 4 }}>ūüí° {note}</div>}
      </div>
    );

    const Section = ({ title, children, color }) => (
      <div style={{ marginBottom: 28 }}>
        <h3 style={{ color, fontFamily: "'Georgia', serif", fontSize: "1.1em", fontWeight: 700, marginBottom: 12, paddingBottom: 6, borderBottom: "1px solid rgba(255,255,255,0.08)" }}>{title}</h3>
        {children}
      </div>
    );

    const InfoBox = ({ color, bg, children }) => (
      <div style={{ background: bg, border: `1px solid ${color}`, borderRadius: 8, padding: "12px 16px", marginBottom: 18, fontSize: "0.88em", color }}>{children}</div>
    );

    const content = {
      halogens: (c) => (
        <>
          <InfoBox color="#86efac" bg="rgba(74,222,128,0.07)">
            <b>Key idea:</b> More reactive halogens are better oxidising agents ‚ÄĒ they steal electrons more easily. Order: Cl‚āā &gt; Br‚āā &gt; I‚āā. A halogen can only displace a <em>less</em> reactive halide.
          </InfoBox>
          <Section title="Halogen Displacement" color={c}>
            <Reaction color={c} equation="Cl‚āā + 2KBr ‚Üí 2KCl + Br‚āā" oxidised="Br‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="Cl‚āā (0 ‚Üí ‚ąí1)" obs="Colourless ‚Üí orange/brown solution" note="Cl‚āā is a stronger oxidising agent so it steals electrons from Br‚ĀĽ. Br‚ĀĽ loses an electron (oxidised), Cl‚āā gains electrons (reduced)." />
            <Reaction color={c} equation="Cl‚āā + 2KI ‚Üí 2KCl + I‚āā" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="Cl‚āā (0 ‚Üí ‚ąí1)" obs="Colourless ‚Üí brown/violet solution. Brown in water, violet in organic solvent" note="Same logic ‚ÄĒ Cl‚āā oxidises I‚ĀĽ. I‚āā formed is brown in water." />
            <Reaction color={c} equation="Br‚āā + 2KI ‚Üí 2KBr + I‚āā" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="Br‚āā (0 ‚Üí ‚ąí1)" obs="Orange/brown ‚Üí darker brown" note="Br‚āā can oxidise I‚ĀĽ (Br‚āā is more reactive than I‚āā), but Br‚āā CANNOT displace Cl‚ĀĽ." />
            <Reaction color={c} equation="I‚āā + KCl ‚Üí NO REACTION" obs="Nothing happens" note="I‚āā is the weakest oxidising agent of the three ‚ÄĒ it cannot oxidise Cl‚ĀĽ or Br‚ĀĽ." />
          </Section>
          <Section title="Halogens with NaOH ‚ÄĒ Disproportionation" color={c}>
            <div style={{ color: "#94a3b8", fontSize: "0.85em", marginBottom: 10 }}>Disproportionation = same element gets BOTH oxidised AND reduced at the same time.</div>
            <Reaction color={c} equation="Cl‚āā + 2NaOH ‚Üí NaCl + NaOCl + H‚āāO   [cold, dilute]" oxidised="Cl‚āā half: 0 ‚Üí +1 (in NaOCl, chlorate(I))" reduced="Cl‚āā half: 0 ‚Üí ‚ąí1 (in NaCl)" obs="Yellow-green gas absorbed, solution formed" note="Both products come from the same Cl‚āā molecule splitting. One Cl becomes +1 (bleach, NaOCl) and one becomes ‚ąí1 (NaCl). This is disproportionation." />
            <Reaction color={c} equation="3Cl‚āā + 6NaOH ‚Üí 5NaCl + NaClO‚āÉ + 3H‚āāO   [hot, conc]" oxidised="Cl‚āā fraction: 0 ‚Üí +5 (in NaClO‚āÉ, chlorate(V))" reduced="Cl‚āā fraction: 0 ‚Üí ‚ąí1 (in NaCl)" note="Hotter conditions drive further oxidation to +5. Still disproportionation ‚ÄĒ Cl is both oxidised and reduced." />
          </Section>
          <Section title="Testing Halides with AgNO‚āÉ (not redox, but linked)" color={c}>
            <div style={{ color: "#94a3b8", fontSize: "0.85em" }}>Cl‚ĀĽ ‚Üí white ppt (AgCl, soluble in dilute NH‚āÉ) | Br‚ĀĽ ‚Üí cream ppt (AgBr, soluble in conc NH‚āÉ) | I‚ĀĽ ‚Üí yellow ppt (AgI, insoluble in NH‚āÉ). Not redox ‚ÄĒ just precipitation. Oxidation states don't change.</div>
          </Section>
        </>
      ),

      halides_h2so4: (c) => (
        <>
          <InfoBox color="#fde68a" bg="rgba(250,204,21,0.07)">
            <b>Key idea:</b> Concentrated H‚āāSO‚āĄ acts as an oxidising agent. The stronger the reducing power of the halide, the further it reduces H‚āāSO‚āĄ. HCl can't reduce it at all. HBr reduces it to SO‚āā. HI reduces it all the way to H‚āāS.
          </InfoBox>
          <Section title="NaCl + Conc H‚āāSO‚āĄ" color={c}>
            <Reaction color={c} equation="NaCl + H‚āāSO‚āĄ(conc) ‚Üí NaHSO‚āĄ + HCl‚ÜĎ" obs="Steamy/misty fumes of HCl. Pungent smell." note="NOT a redox reaction ‚ÄĒ sulfur stays at +6, chlorine stays at ‚ąí1. H‚āāSO‚āĄ is simply acting as an acid here. HCl is too weak a reducing agent to reduce H‚āāSO‚āĄ." />
          </Section>
          <Section title="NaBr + Conc H‚āāSO‚āĄ" color={c}>
            <Reaction color={c} equation="NaBr + H‚āāSO‚āĄ(conc) ‚Üí NaHSO‚āĄ + HBr‚ÜĎ" note="First step ‚ÄĒ just acid-base, same as Cl‚ĀĽ" />
            <Reaction color={c} equation="2HBr + H‚āāSO‚āĄ(conc) ‚Üí SO‚āā + Br‚āā + 2H‚āāO" oxidised="Br‚ĀĽ (‚ąí1 ‚Üí 0, in Br‚āā)" reduced="S (+6 ‚Üí +4, in SO‚āā)" obs="Brown fumes of Br‚āā, sharp smell of SO‚āā" note="HBr is a strong enough reducing agent to reduce H‚āāSO‚āĄ to SO‚āā ‚ÄĒ but no further. So you see SO‚āā and Br‚āā but no H‚āāS or S." />
          </Section>
          <Section title="NaI + Conc H‚āāSO‚āĄ (most dramatic)" color={c}>
            <Reaction color={c} equation="NaI + H‚āāSO‚āĄ(conc) ‚Üí NaHSO‚āĄ + HI‚ÜĎ" note="First step ‚ÄĒ acid-base" />
            <Reaction color={c} equation="2HI + H‚āāSO‚āĄ(conc) ‚Üí SO‚āā + I‚āā + 2H‚āāO" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="S (+6 ‚Üí +4)" obs="Violet/purple fumes of I‚āā" />
            <Reaction color={c} equation="6HI + H‚āāSO‚āĄ(conc) ‚Üí S‚Üď + 3I‚āā + 4H‚āāO" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="S (+6 ‚Üí 0)" obs="Yellow solid sulfur precipitates" />
            <Reaction color={c} equation="8HI + H‚āāSO‚āĄ(conc) ‚Üí H‚āāS‚ÜĎ + 4I‚āā + 4H‚āāO" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="S (+6 ‚Üí ‚ąí2)" obs="Rotten egg smell of H‚āāS" note="HI is such a strong reducing agent it drives S all the way down to ‚ąí2 in H‚āāS. You observe all three: SO‚āā, yellow S, and H‚āāS alongside violet I‚āā fumes." />
          </Section>
          <Section title="Summary Table" color={c}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.85em", color: "#cbd5e1" }}>
                <thead>
                  <tr style={{ borderBottom: "1px solid rgba(255,255,255,0.15)" }}>
                    {["Halide", "Products from H‚āāSO‚āĄ", "S reduced to"].map(h => <th key={h} style={{ padding: "8px 12px", textAlign: "left", color: c }}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {[["Cl‚ĀĽ", "HCl only", "Not reduced (no redox)"], ["Br‚ĀĽ", "HBr, SO‚āā, Br‚āā", "S: +6 ‚Üí +4"], ["I‚ĀĽ", "HI, SO‚āā, S, H‚āāS, I‚āā", "S: +6 ‚Üí +4, 0, ‚ąí2"]].map(([a, b, cc]) => (
                    <tr key={a} style={{ borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                      <td style={{ padding: "8px 12px" }}>{a}</td>
                      <td style={{ padding: "8px 12px", fontFamily: "monospace" }}>{b}</td>
                      <td style={{ padding: "8px 12px" }}>{cc}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Section>
        </>
      ),

      sulfur: (c) => (
        <>
          <InfoBox color="#fed7aa" bg="rgba(251,146,60,0.07)">
            <b>Key idea:</b> Sulfur oxidation states: H‚āāS = ‚ąí2, S = 0, SO‚āā = +4, SO‚āÉ = +6, H‚āāSO‚āĄ = +6. SO‚āā is most interesting ‚ÄĒ it can act as BOTH a reducing agent (gets oxidised to +6) and an oxidising agent (gets reduced to 0 or ‚ąí2).
          </InfoBox>
          <Section title="Contact Process (making H‚āāSO‚āĄ)" color={c}>
            <Reaction color={c} equation="S + O‚āā ‚Üí SO‚āā" oxidised="S (0 ‚Üí +4)" reduced="O‚āā (0 ‚Üí ‚ąí2)" note="Burning sulfur. S is oxidised by oxygen." />
            <Reaction color={c} equation="2SO‚āā + O‚āā ‚áĆ 2SO‚āÉ   [V‚āāO‚āÖ catalyst, ~450¬įC, 1‚Äď2 atm]" oxidised="S (+4 ‚Üí +6)" reduced="O‚āā (0 ‚Üí ‚ąí2)" obs="Equilibrium ‚ÄĒ can go either way" note="This is the key step. V‚āāO‚āÖ works here because vanadium cycles between +5 and +4 ‚ÄĒ it oxidises SO‚āā then gets re-oxidised by O‚āā. Reversible reaction, so conditions are a compromise." />
            <Reaction color={c} equation="SO‚āÉ + H‚āāSO‚āĄ ‚Üí H‚āāS‚āāO‚āá   then   H‚āāS‚āāO‚āá + H‚āāO ‚Üí 2H‚āāSO‚āĄ" note="SO‚āÉ isn't dissolved directly in water (forms acid mist). Instead absorbed into conc H‚āāSO‚āĄ to make oleum, then diluted." />
          </Section>
          <Section title="SO‚āā as a Reducing Agent (gets oxidised)" color={c}>
            <Reaction color={c} equation="SO‚āā + Br‚āā + 2H‚āāO ‚Üí H‚āāSO‚āĄ + 2HBr" oxidised="S (+4 ‚Üí +6, in H‚āāSO‚āĄ)" reduced="Br‚āā (0 ‚Üí ‚ąí1)" obs="Orange bromine water decolourises" note="SO‚āā donates electrons to Br‚āā. Br‚āā is decolourised ‚ÄĒ this is a test that SO‚āā is present AND acts as a reducing agent." />
            <Reaction color={c} equation="SO‚āā + Cl‚āā + 2H‚āāO ‚Üí H‚āāSO‚āĄ + 2HCl" oxidised="S (+4 ‚Üí +6)" reduced="Cl‚āā (0 ‚Üí ‚ąí1)" note="Same pattern with chlorine." />
            <Reaction color={c} equation="SO‚āā + I‚āā + 2H‚āāO ‚Üí H‚āāSO‚āĄ + 2HI" oxidised="S (+4 ‚Üí +6)" reduced="I‚āā (0 ‚Üí ‚ąí1)" obs="Brown I‚āā solution decolourises" note="SO‚āā decolourises iodine solution ‚ÄĒ another use as a reducing agent." />
          </Section>
          <Section title="SO‚āā as an Oxidising Agent (gets reduced)" color={c}>
            <Reaction color={c} equation="SO‚āā + 2H‚āāS ‚Üí 3S + 2H‚āāO" oxidised="S in H‚āāS (‚ąí2 ‚Üí 0)" reduced="S in SO‚āā (+4 ‚Üí 0)" obs="Yellow sulfur precipitate forms" note="When SO‚āā meets H‚āāS, SO‚āā wins the electron tug-of-war ‚ÄĒ it oxidises H‚āāS while it itself gets reduced to elemental sulfur. Both S atoms end up at 0." />
          </Section>
          <Section title="Conc H‚āāSO‚āĄ as Oxidising Agent" color={c}>
            <Reaction color={c} equation="Cu + 2H‚āāSO‚āĄ(conc, hot) ‚Üí CuSO‚āĄ + SO‚āā + 2H‚āāO" oxidised="Cu (0 ‚Üí +2)" reduced="S (+6 ‚Üí +4, in SO‚āā)" obs="Blue CuSO‚āĄ solution, SO‚āā gas" note="Dilute H‚āāSO‚āĄ does NOT react with Cu. Only concentrated H‚āāSO‚āĄ can ‚ÄĒ it acts as the oxidising agent, not H‚Āļ." />
            <Reaction color={c} equation="C + 2H‚āāSO‚āĄ(conc, hot) ‚Üí CO‚āā + 2SO‚āā + 2H‚āāO" oxidised="C (0 ‚Üí +4)" reduced="S (+6 ‚Üí +4)" note="Conc H‚āāSO‚āĄ oxidises even non-metals like carbon." />
          </Section>
        </>
      ),

      vanadium: (c) => (
        <>
          <InfoBox color="#bfdbfe" bg="rgba(96,165,250,0.07)">
            <b>Key idea:</b> Vanadium exists in 4 oxidation states. When you reduce ammonium vanadate(V) with zinc in acid, you watch it go through all four colours step by step ‚ÄĒ like a colour-change ladder.
          </InfoBox>
          <Section title="Oxidation States & Colours" color={c}>
            {[["VO‚āā‚Āļ", "+5", "#facc15", "Yellow", "vanadate(V) ion"], ["VO¬≤‚Āļ", "+4", "#3b82f6", "Blue", "vanadyl(IV) ion"], ["V¬≥‚Āļ", "+3", "#16a34a", "Green", "vanadium(III) ion"], ["V¬≤‚Āļ", "+2", "#7c3aed", "Violet/Lilac", "vanadium(II) ion"]].map(([ion, ox, col, colour, name]) => (
              <div key={ox} style={{ display: "flex", alignItems: "center", gap: 14, padding: "10px 14px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 8, marginBottom: 8 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: col, flexShrink: 0 }} />
                <div>
                  <span style={{ fontFamily: "monospace", fontSize: "1.1em", color: "#f1f5f9" }}>{ion}</span>
                  <span style={{ color: "#94a3b8", marginLeft: 10, fontSize: "0.85em" }}>Oxidation state: <b style={{ color: c }}>{ox}</b> ‚ÄĒ {colour} ‚ÄĒ {name}</span>
                </div>
              </div>
            ))}
          </Section>
          <Section title="Reduction Steps with Zn in Dilute H‚āāSO‚āĄ" color={c}>
            <div style={{ color: "#94a3b8", fontSize: "0.85em", marginBottom: 10 }}>Zinc is a strong enough reducing agent to go all the way from +5 down to +2. Each step, one electron is transferred. You literally see the colour change in the test tube.</div>
            <Reaction color={c} equation="VO‚āā‚Āļ + 2H‚Āļ + e‚ĀĽ ‚Üí VO¬≤‚Āļ + H‚āāO" reduced="V (+5 ‚Üí +4)" obs="Yellow ‚Üí Blue" note="First electron added. Zn donates electrons ‚ÄĒ Zn is being oxidised here (Zn ‚Üí Zn¬≤‚Āļ)." />
            <Reaction color={c} equation="VO¬≤‚Āļ + 2H‚Āļ + e‚ĀĽ ‚Üí V¬≥‚Āļ + H‚āāO" reduced="V (+4 ‚Üí +3)" obs="Blue ‚Üí Green" note="Second electron added." />
            <Reaction color={c} equation="V¬≥‚Āļ + e‚ĀĽ ‚Üí V¬≤‚Āļ" reduced="V (+3 ‚Üí +2)" obs="Green ‚Üí Violet/Lilac" note="Third electron added. At this point Zn has done all its work." />
          </Section>
          <Section title="Vanadium as Catalyst in Contact Process" color={c}>
            <Reaction color={c} equation="V‚āāO‚āÖ + SO‚āā ‚Üí V‚āāO‚āĄ + SO‚āÉ   (V: +5 ‚Üí +4)" reduced="V (+5 ‚Üí +4)" oxidised="S (+4 ‚Üí +6)" note="V‚āāO‚āÖ oxidises SO‚āā to SO‚āÉ, and gets reduced itself to V‚āāO‚āĄ." />
            <Reaction color={c} equation="V‚āāO‚āĄ + ¬ĹO‚āā ‚Üí V‚āāO‚āÖ   (V: +4 ‚Üí +5)" oxidised="V (+4 ‚Üí +5)" reduced="O‚āā (0 ‚Üí ‚ąí2)" note="V‚āāO‚āĄ is then reoxidised back to V‚āāO‚āÖ by O‚āā. This is why V‚āāO‚āÖ works as a catalyst ‚ÄĒ it's regenerated. Its ability to cycle between +4 and +5 is the key." />
          </Section>
        </>
      ),

      manganese: (c) => (
        <>
          <InfoBox color="#e9d5ff" bg="rgba(192,132,252,0.07)">
            <b>Key idea:</b> MnO‚āĄ‚ĀĽ (permanganate) is one of the most powerful oxidising agents you'll use. What Mn ends up as depends entirely on whether the solution is acidic or alkaline. In acid ‚Üí Mn¬≤‚Āļ (colourless). In alkali ‚Üí MnO‚āā (brown solid).
          </InfoBox>
          <Section title="MnO‚āĄ‚ĀĽ in Acidic Solution (the important one)" color={c}>
            <Reaction color={c} equation="MnO‚āĄ‚ĀĽ + 8H‚Āļ + 5e‚ĀĽ ‚Üí Mn¬≤‚Āļ + 4H‚āāO" reduced="Mn (+7 ‚Üí +2)" obs="Purple/violet ‚Üí colourless" note="The half-equation for reduction. Needs H‚Āļ ‚ÄĒ this is why acid is required. 5 electrons needed per MnO‚āĄ‚ĀĽ. You must learn this half-equation." />
            <Reaction color={c} equation="2MnO‚āĄ‚ĀĽ + 5Fe¬≤‚Āļ + 16H‚Āļ ‚Üí 2Mn¬≤‚Āļ + 5Fe¬≥‚Āļ + 8H‚āāO" reduced="Mn (+7 ‚Üí +2)" oxidised="Fe (+2 ‚Üí +3)" obs="Purple decolourises" note="Classic titration ‚ÄĒ used to find Fe¬≤‚Āļ concentration. 5 Fe¬≤‚Āļ per 2 MnO‚āĄ‚ĀĽ because Mn needs 5e‚ĀĽ and Fe only gives 1e‚ĀĽ." />
            <Reaction color={c} equation="2MnO‚āĄ‚ĀĽ + 5H‚āāO‚āā + 6H‚Āļ ‚Üí 2Mn¬≤‚Āļ + 5O‚āā + 8H‚āāO" reduced="Mn (+7 ‚Üí +2)" oxidised="O (‚ąí1 ‚Üí 0, in H‚āāO‚āā)" obs="Purple decolourises, effervescence of O‚āā" note="H‚āāO‚āā acts as a REDUCING agent here. It donates electrons to permanganate." />
            <Reaction color={c} equation="2MnO‚āĄ‚ĀĽ + 5C‚āāO‚āĄ¬≤‚ĀĽ + 16H‚Āļ ‚Üí 2Mn¬≤‚Āļ + 10CO‚āā + 8H‚āāO" reduced="Mn (+7 ‚Üí +2)" oxidised="C (+3 ‚Üí +4, in oxalate)" obs="Purple decolourises. Needs warming to start." note="Oxalate (ethanedioate) is oxidised to CO‚āā. Used in titrations with iron tablets." />
          </Section>
          <Section title="MnO‚āĄ‚ĀĽ in Neutral/Alkaline Solution" color={c}>
            <Reaction color={c} equation="MnO‚āĄ‚ĀĽ + 2H‚āāO + 3e‚ĀĽ ‚Üí MnO‚āā + 4OH‚ĀĽ" reduced="Mn (+7 ‚Üí +4)" obs="Purple ‚Üí brown precipitate of MnO‚āā" note="In alkali, Mn only gets reduced to +4 (MnO‚āā), not all the way to +2. The H‚Āļ ions aren't available, so the reaction doesn't go as far." />
          </Section>
          <Section title="MnO‚āā as an Oxidising Agent" color={c}>
            <Reaction color={c} equation="MnO‚āā + 4HCl(conc) ‚Üí MnCl‚āā + Cl‚āā‚ÜĎ + 2H‚āāO" reduced="Mn (+4 ‚Üí +2)" oxidised="Cl (‚ąí1 ‚Üí 0)" obs="Yellow-green gas (Cl‚āā) produced" note="Lab preparation of Cl‚āā. MnO‚āā acts as oxidising agent. Must be concentrated HCl ‚ÄĒ dilute HCl won't work." />
            <Reaction color={c} equation="2H‚āāO‚āā ‚Üí 2H‚āāO + O‚āā   [MnO‚āā as catalyst]" note="MnO‚āā also catalyses decomposition of H‚āāO‚āā. It doesn't change oxidation states itself permanently here ‚ÄĒ it's a catalyst." />
          </Section>
        </>
      ),

      chromium: (c) => (
        <>
          <InfoBox color="#fed7aa" bg="rgba(249,115,22,0.07)">
            <b>Key idea:</b> The two key chromium ions are Cr‚āāO‚āá¬≤‚ĀĽ (orange, +6) and CrO‚āĄ¬≤‚ĀĽ (yellow, +6). They interconvert with pH ‚ÄĒ that's NOT redox. But Cr‚āāO‚āá¬≤‚ĀĽ is also a powerful oxidising agent that gets reduced to Cr¬≥‚Āļ (green, +3).
          </InfoBox>
          <Section title="pH-Dependent Equilibrium (NOT redox)" color={c}>
            <Reaction color={c} equation="Cr‚āāO‚āá¬≤‚ĀĽ + 2OH‚ĀĽ ‚áĆ 2CrO‚āĄ¬≤‚ĀĽ + H‚āāO" obs="Orange ‚Üí Yellow (add alkali)" note="Add acid: equilibrium shifts left ‚Üí orange. Add alkali: equilibrium shifts right ‚Üí yellow. Chromium stays at +6 throughout ‚ÄĒ this is just acid-base equilibrium, not redox." />
          </Section>
          <Section title="Cr‚āāO‚āá¬≤‚ĀĽ as Oxidising Agent (in acid)" color={c}>
            <Reaction color={c} equation="Cr‚āāO‚āá¬≤‚ĀĽ + 14H‚Āļ + 6e‚ĀĽ ‚Üí 2Cr¬≥‚Āļ + 7H‚āāO" reduced="Cr (+6 ‚Üí +3)" obs="Orange ‚Üí Green" note="The half-equation. 6 electrons needed (3 per Cr atom, 2 Cr atoms). Needs acid ‚ÄĒ H‚Āļ appears on the left." />
            <Reaction color={c} equation="Cr‚āāO‚āá¬≤‚ĀĽ + 6Fe¬≤‚Āļ + 14H‚Āļ ‚Üí 2Cr¬≥‚Āļ + 6Fe¬≥‚Āļ + 7H‚āāO" reduced="Cr (+6 ‚Üí +3)" oxidised="Fe (+2 ‚Üí +3)" obs="Orange ‚Üí Green" note="Dichromate oxidises Fe¬≤‚Āļ. 6 Fe¬≤‚Āļ needed per Cr‚āāO‚āá¬≤‚ĀĽ because 6 electrons needed. Titrations use this." />
            <Reaction color={c} equation="Cr‚āāO‚āá¬≤‚ĀĽ + 6I‚ĀĽ + 14H‚Āļ ‚Üí 2Cr¬≥‚Āļ + 3I‚āā + 7H‚āāO" reduced="Cr (+6 ‚Üí +3)" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" obs="Orange ‚Üí Green, brown I‚āā forms" />
            <Reaction color={c} equation="Cr‚āāO‚āá¬≤‚ĀĽ + 3C‚āāH‚āÖOH + 8H‚Āļ ‚Üí 2Cr¬≥‚Āļ + 3CH‚āÉCHO + 7H‚āāO" reduced="Cr (+6 ‚Üí +3)" oxidised="C (ethanol ‚Üí ethanal)" obs="Orange ‚Üí Green ‚ÄĒ breathalyser reaction!" note="Oxidises ethanol to ethanal (if limited dichromate) or ethanoic acid (excess). The original breathalyser used this colour change." />
          </Section>
          <Section title="Cr¬≥‚Āļ in Excess Alkali ‚Üí CrO‚āĄ¬≤‚ĀĽ" color={c}>
            <Reaction color={c} equation="Cr¬≥‚Āļ + 3OH‚ĀĽ ‚Üí Cr(OH)‚āÉ‚Üď" obs="Green solution ‚Üí grey-green precipitate" note="First, adding NaOH precipitates Cr(OH)‚āÉ. Cr(OH)‚āÉ is amphoteric ‚ÄĒ it dissolves in both acid and excess alkali." />
            <Reaction color={c} equation="Cr(OH)‚āÉ + OH‚ĀĽ ‚Üí [Cr(OH)‚āĄ]‚ĀĽ" obs="Precipitate dissolves in excess NaOH ‚Üí dark green solution" note="Amphoteric behaviour. Cr(OH)‚āÉ dissolves in excess alkali to form chromate(III) complex." />
            <Reaction color={c} equation="2[Cr(OH)‚āĄ]‚ĀĽ + 3H‚āāO‚āā ‚Üí 2CrO‚āĄ¬≤‚ĀĽ + 2H‚Āļ + 6H‚āāO" oxidised="Cr (+3 ‚Üí +6)" reduced="O in H‚āāO‚āā (‚ąí1 ‚Üí ‚ąí2)" obs="Dark green ‚Üí yellow" note="H‚āāO‚āā oxidises Cr¬≥‚Āļ back to Cr‚Ā∂‚Āļ (as chromate). H‚āāO‚āā acts as oxidising agent." />
          </Section>
        </>
      ),

      iron: (c) => (
        <>
          <InfoBox color="#fecaca" bg="rgba(248,113,113,0.07)">
            <b>Key idea:</b> Iron switches between +2 (pale green) and +3 (yellow-brown). Fe¬≤‚Āļ is easily oxidised to Fe¬≥‚Āļ. Fe¬≥‚Āļ can be reduced back to Fe¬≤‚Āļ (notably by I‚ĀĽ). Knowing which way it goes and what's doing the oxidising/reducing is everything.
          </InfoBox>
          <Section title="Oxidising Fe¬≤‚Āļ ‚Üí Fe¬≥‚Āļ" color={c}>
            <Reaction color={c} equation="2Fe¬≤‚Āļ + Cl‚āā ‚Üí 2Fe¬≥‚Āļ + 2Cl‚ĀĽ" oxidised="Fe (+2 ‚Üí +3)" reduced="Cl‚āā (0 ‚Üí ‚ąí1)" obs="Pale green ‚Üí yellow-brown" note="Cl‚āā is the oxidising agent. This is why Cl‚āā is used to convert Fe¬≤‚Āļ to Fe¬≥‚Āļ in qualitative analysis." />
            <Reaction color={c} equation="2Fe¬≤‚Āļ + H‚āāO‚āā + 2H‚Āļ ‚Üí 2Fe¬≥‚Āļ + 2H‚āāO" oxidised="Fe (+2 ‚Üí +3)" reduced="O in H‚āāO‚āā (‚ąí1 ‚Üí ‚ąí2)" obs="Pale green ‚Üí yellow-brown" note="H‚āāO‚āā as oxidising agent." />
            <Reaction color={c} equation="See MnO‚āĄ‚ĀĽ section: 2MnO‚āĄ‚ĀĽ + 5Fe¬≤‚Āļ + 16H‚Āļ ‚Üí 2Mn¬≤‚Āļ + 5Fe¬≥‚Āļ + 8H‚āāO" note="MnO‚āĄ‚ĀĽ oxidises Fe¬≤‚Āļ ‚ÄĒ one of the most common titrations." />
          </Section>
          <Section title="Reducing Fe¬≥‚Āļ ‚Üí Fe¬≤‚Āļ" color={c}>
            <Reaction color={c} equation="2Fe¬≥‚Āļ + 2I‚ĀĽ ‚Üí 2Fe¬≤‚Āļ + I‚āā" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="Fe (+3 ‚Üí +2)" obs="Yellow-brown ‚Üí pale green + brown I‚āā" note="Fe¬≥‚Āļ is a strong enough oxidising agent to oxidise I‚ĀĽ. This reaction is used in iodometric titrations ‚ÄĒ the I‚āā produced is then titrated with thiosulfate." />
            <Reaction color={c} equation="2Fe¬≥‚Āļ + Zn ‚Üí 2Fe¬≤‚Āļ + Zn¬≤‚Āļ" oxidised="Zn (0 ‚Üí +2)" reduced="Fe (+3 ‚Üí +2)" note="Zinc (strong reducing agent) reduces Fe¬≥‚Āļ." />
            <Reaction color={c} equation="2Fe¬≥‚Āļ + SO‚āā + 2H‚āāO ‚Üí 2Fe¬≤‚Āļ + SO‚āĄ¬≤‚ĀĽ + 4H‚Āļ" oxidised="S (+4 ‚Üí +6)" reduced="Fe (+3 ‚Üí +2)" note="SO‚āā reduces Fe¬≥‚Āļ to Fe¬≤‚Āļ." />
          </Section>
          <Section title="Tests for Iron Ions" color={c}>
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 8, padding: "12px 16px", fontSize: "0.85em", color: "#cbd5e1" }}>
              <div style={{ marginBottom: 6 }}><b style={{ color: c }}>Fe¬≤‚Āļ test:</b> Add NaOH ‚Üí dirty green precipitate Fe(OH)‚āā. Turns rusty-brown on standing in air as Fe¬≤‚Āļ oxidises to Fe¬≥‚Āļ.</div>
              <div style={{ marginBottom: 6 }}><b style={{ color: c }}>Fe¬≥‚Āļ test:</b> Add NaOH ‚Üí rust/orange-brown precipitate Fe(OH)‚āÉ. OR add KSCN ‚Üí intense blood red solution.</div>
              <div><b style={{ color: c }}>Distinguish Fe¬≤‚Āļ from Fe¬≥‚Āļ:</b> Add KSCN ‚ÄĒ only Fe¬≥‚Āļ goes blood red.</div>
            </div>
          </Section>
        </>
      ),

      copper: (c) => (
        <>
          <InfoBox color="#fed7aa" bg="rgba(251,146,60,0.07)">
            <b>Key idea:</b> Copper exists as Cu¬≤‚Āļ (+2, blue), Cu‚Āļ (+1), or Cu (0). In water, Cu‚Āļ is unstable and disproportionates. The Cu¬≤‚Āļ + I‚ĀĽ reaction is especially important for titrations.
          </InfoBox>
          <Section title="Cu‚Āļ Disproportionation" color={c}>
            <Reaction color={c} equation="2Cu‚Āļ ‚Üí Cu¬≤‚Āļ + Cu" oxidised="Cu‚Āļ fraction (+1 ‚Üí +2)" reduced="Cu‚Āļ fraction (+1 ‚Üí 0)" obs="Cu‚Āļ is unstable in aqueous solution ‚ÄĒ spontaneously disproportionates to blue Cu¬≤‚Āļ solution + copper metal" note="This is why Cu‚Āļ isn't stable in water. Cu‚Āļ acts as both oxidising and reducing agent simultaneously." />
          </Section>
          <Section title="Cu¬≤‚Āļ + Iodide (KEY for titrations)" color={c}>
            <Reaction color={c} equation="2Cu¬≤‚Āļ + 4I‚ĀĽ ‚Üí 2CuI‚Üď + I‚āā" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0, in I‚āā)" reduced="Cu (+2 ‚Üí +1, in CuI)" obs="Blue solution ‚Üí white CuI precipitate + brown I‚āā" note="Cu¬≤‚Āļ oxidises I‚ĀĽ to I‚āā. The amount of I‚āā produced = amount of Cu¬≤‚Āļ. You then titrate the I‚āā with sodium thiosulfate to find how much Cu¬≤‚Āļ was originally present." />
          </Section>
          <Section title="Copper + Acids" color={c}>
            <Reaction color={c} equation="Cu + 2H‚āāSO‚āĄ(conc, hot) ‚Üí CuSO‚āĄ + SO‚āā + 2H‚āāO" oxidised="Cu (0 ‚Üí +2)" reduced="S (+6 ‚Üí +4)" obs="Blue CuSO‚āĄ solution formed, SO‚āā gas" note="Cu doesn't react with dilute H‚āāSO‚āĄ ‚ÄĒ it's not reactive enough. Only conc H‚āāSO‚āĄ as oxidising agent works." />
            <Reaction color={c} equation="Cu + 4HNO‚āÉ(conc) ‚Üí Cu(NO‚āÉ)‚āā + 2NO‚āā + 2H‚āāO" oxidised="Cu (0 ‚Üí +2)" reduced="N (+5 ‚Üí +4, in NO‚āā)" obs="Brown gas (NO‚āā) produced, blue solution" note="Conc nitric acid produces NO‚āā." />
            <Reaction color={c} equation="3Cu + 8HNO‚āÉ(dilute) ‚Üí 3Cu(NO‚āÉ)‚āā + 2NO + 4H‚āāO" oxidised="Cu (0 ‚Üí +2)" reduced="N (+5 ‚Üí +2, in NO)" obs="Colourless NO gas (turns brown in air as 2NO + O‚āā ‚Üí 2NO‚āā)" note="Dilute nitric acid produces NO instead of NO‚āā." />
          </Section>
          <Section title="Copper with Oxygen/Halogens" color={c}>
            <Reaction color={c} equation="2Cu + O‚āā ‚Üí 2CuO   (on heating)" oxidised="Cu (0 ‚Üí +2)" reduced="O‚āā (0 ‚Üí ‚ąí2)" obs="Pink/orange copper ‚Üí black CuO" />
            <Reaction color={c} equation="Cu + Cl‚āā ‚Üí CuCl‚āā" oxidised="Cu (0 ‚Üí +2)" reduced="Cl‚āā (0 ‚Üí ‚ąí1)" obs="Brown/green solid" />
          </Section>
        </>
      ),

      iodine: (c) => (
        <>
          <InfoBox color="#e2e8f0" bg="rgba(148,163,184,0.07)">
            <b>Key idea:</b> The iodine/thiosulfate reaction is the backbone of iodometric titrations. You produce I‚āā via a redox reaction, then use Na‚āāS‚āāO‚āÉ to titrate the I‚āā. This lets you work backwards to find the original oxidising agent.
          </InfoBox>
          <Section title="The Core Reaction: I‚āā + Thiosulfate" color={c}>
            <Reaction color={c} equation="I‚āā + 2S‚āāO‚āÉ¬≤‚ĀĽ ‚Üí 2I‚ĀĽ + S‚āĄO‚āÜ¬≤‚ĀĽ" reduced="I‚āā (0 ‚Üí ‚ąí1)" oxidised="S (+2 ‚Üí +2.5 average in S‚āĄO‚āÜ¬≤‚ĀĽ)" obs="Brown I‚āā solution ‚Üí colourless when I‚āā used up. Starch indicator: blue-black ‚Üí colourless at endpoint." note="The ratio is 1 I‚āā : 2 S‚āāO‚āÉ¬≤‚ĀĽ. Learn this ‚ÄĒ it comes up in every iodometric calculation." />
          </Section>
          <Section title="Producing I‚āā ‚ÄĒ Indirect Titration Examples" color={c}>
            <Reaction color={c} equation="2Fe¬≥‚Āļ + 2I‚ĀĽ ‚Üí 2Fe¬≤‚Āļ + I‚āā" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="Fe (+3 ‚Üí +2)" note="Excess KI added to Fe¬≥‚Āļ sample ‚Üí I‚āā produced. Titrate I‚āā with Na‚āāS‚āāO‚āÉ ‚Üí find moles of I‚āā ‚Üí find moles of Fe¬≥‚Āļ." />
            <Reaction color={c} equation="2Cu¬≤‚Āļ + 4I‚ĀĽ ‚Üí 2CuI + I‚āā" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="Cu (+2 ‚Üí +1)" note="Excess KI added to Cu¬≤‚Āļ sample ‚Üí I‚āā produced. Same back-titration logic." />
            <Reaction color={c} equation="Cr‚āāO‚āá¬≤‚ĀĽ + 6I‚ĀĽ + 14H‚Āļ ‚Üí 2Cr¬≥‚Āļ + 3I‚āā + 7H‚āāO" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="Cr (+6 ‚Üí +3)" note="Dichromate + excess KI ‚Üí I‚āā ‚Üí titrate with thiosulfate." />
            <Reaction color={c} equation="IO‚āÉ‚ĀĽ + 5I‚ĀĽ + 6H‚Āļ ‚Üí 3I‚āā + 3H‚āāO" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" reduced="I in IO‚āÉ‚ĀĽ (+5 ‚Üí 0)" note="Iodate + iodide ‚Üí I‚āā. Also disproportionation in reverse." />
          </Section>
          <Section title="Starch Indicator" color={c}>
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 8, padding: "12px 16px", fontSize: "0.85em", color: "#cbd5e1" }}>
              Starch forms a deep blue-black complex with I‚āā (not a chemical reaction ‚ÄĒ it's an inclusion complex). When all I‚āā has been reduced to I‚ĀĽ by Na‚āāS‚āāO‚āÉ, the blue-black colour disappears to colourless ‚ÄĒ this is the endpoint. Add starch near the end (when solution is pale yellow) so the endpoint is sharp.
            </div>
          </Section>
        </>
      ),

      h2o2: (c) => (
        <>
          <InfoBox color="#cffafe" bg="rgba(103,232,249,0.07)">
            <b>Key idea:</b> H‚āāO‚āā is special ‚ÄĒ oxygen is at oxidation state ‚ąí1. From ‚ąí1, it can go DOWN to ‚ąí2 (oxidising agent) or UP to 0 (reducing agent). It can even react with itself ‚ÄĒ disproportionation.
          </InfoBox>
          <Section title="H‚āāO‚āā as Oxidising Agent (O goes ‚ąí1 ‚Üí ‚ąí2)" color={c}>
            <Reaction color={c} equation="H‚āāO‚āā + 2Fe¬≤‚Āļ + 2H‚Āļ ‚Üí 2Fe¬≥‚Āļ + 2H‚āāO" reduced="O (‚ąí1 ‚Üí ‚ąí2, in H‚āāO)" oxidised="Fe (+2 ‚Üí +3)" note="H‚āāO‚āā oxidises Fe¬≤‚Āļ. The O in H‚āāO‚āā gains electrons, going to ‚ąí2 in water." />
            <Reaction color={c} equation="H‚āāO‚āā + 2I‚ĀĽ + 2H‚Āļ ‚Üí I‚āā + 2H‚āāO" reduced="O (‚ąí1 ‚Üí ‚ąí2)" oxidised="I‚ĀĽ (‚ąí1 ‚Üí 0)" obs="Brown I‚āā forms" note="H‚āāO‚āā oxidises I‚ĀĽ to I‚āā." />
            <Reaction color={c} equation="H‚āāO‚āā + 2e‚ĀĽ + 2H‚Āļ ‚Üí 2H‚āāO   [half-equation]" reduced="O (‚ąí1 ‚Üí ‚ąí2)" note="Standard reduction half-equation for H‚āāO‚āā." />
          </Section>
          <Section title="H‚āāO‚āā as Reducing Agent (O goes ‚ąí1 ‚Üí 0)" color={c}>
            <Reaction color={c} equation="2MnO‚āĄ‚ĀĽ + 5H‚āāO‚āā + 6H‚Āļ ‚Üí 2Mn¬≤‚Āļ + 5O‚āā + 8H‚āāO" oxidised="O (‚ąí1 ‚Üí 0, in O‚āā)" reduced="Mn (+7 ‚Üí +2)" obs="Purple ‚Üí colourless, effervescence of O‚āā" note="Against a stronger oxidising agent like MnO‚āĄ‚ĀĽ, H‚āāO‚āā gives up electrons ‚ÄĒ it acts as reducing agent. O ends up at 0 in O‚āā gas." />
            <Reaction color={c} equation="Cr‚āāO‚āá¬≤‚ĀĽ + 3H‚āāO‚āā + 8H‚Āļ ‚Üí 2Cr¬≥‚Āļ + 3O‚āā + 7H‚āāO" oxidised="O (‚ąí1 ‚Üí 0)" reduced="Cr (+6 ‚Üí +3)" note="Same ‚ÄĒ against dichromate, H‚āāO‚āā is the reducing agent." />
          </Section>
          <Section title="H‚āāO‚āā Disproportionation" color={c}>
            <Reaction color={c} equation="2H‚āāO‚āā ‚Üí 2H‚āāO + O‚āā   [MnO‚āā or KI catalyst]" oxidised="O fraction (‚ąí1 ‚Üí 0, in O‚āā)" reduced="O fraction (‚ąí1 ‚Üí ‚ąí2, in H‚āāO)" obs="Rapid effervescence of O‚āā. Relight glowing splint." note="H‚āāO‚āā reacts with itself. One O is oxidised to O‚āā, the other is reduced to water. Classic disproportionation. MnO‚āā catalyses this ‚ÄĒ used in labs to make O‚āā." />
          </Section>
        </>
      ),
    };

    function App() {
      const [active, setActive] = useState("halogens");
      const topic = topics.find(t => t.id === active);

      return (
        <div style={{ minHeight: "100vh", background: "#0b0f18", color: "#e2e8f0", fontFamily: "'Georgia', 'Times New Roman', serif" }}>
          <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "24px 28px 20px" }}>
            <div style={{ fontSize: "0.75em", color: "#64748b", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>AQA A-Level Chemistry</div>
            <h1 style={{ margin: 0, fontSize: "1.7em", fontWeight: 700, color: "#f8fafc", letterSpacing: "-0.01em" }}>Inorganic Redox ‚ÄĒ Complete Guide</h1>
            <div style={{ color: "#94a3b8", fontSize: "0.85em", marginTop: 6 }}>Every reaction you need to know, with oxidation state changes explained</div>
          </div>

          <div style={{ display: "flex", overflowX: "auto", borderBottom: "1px solid rgba(255,255,255,0.08)", background: "#0d1117", padding: "0 12px", scrollbarWidth: "none", gap: 2 }}>
            {topics.map(t => (
              <button key={t.id} onClick={() => setActive(t.id)} style={{ background: active === t.id ? t.dark : "transparent", border: "none", borderBottom: active === t.id ? `2px solid ${t.color}` : "2px solid transparent", color: active === t.id ? t.color : "#64748b", padding: "12px 14px", cursor: "pointer", fontFamily: "inherit", fontSize: "0.82em", fontWeight: active === t.id ? 700 : 500, whiteSpace: "nowrap", transition: "all 0.15s", letterSpacing: "0.01em" }}>
                {t.emoji} {t.label}
              </button>
            ))}
          </div>

          <div style={{ maxWidth: 860, margin: "0 auto", padding: "28px 20px 60px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
              <div style={{ width: 4, height: 32, background: topic.color, borderRadius: 2 }} />
              <h2 style={{ margin: 0, fontSize: "1.4em", fontWeight: 700, color: "#f8fafc" }}>{topic.label}</h2>
            </div>
            {content[active]?.(topic.color)}
          </div>

          <div style={{ borderTop: "1px solid rgba(255,255,255,0.07)", padding: "16px 28px", background: "#0d1117", display: "flex", gap: 20, flexWrap: "wrap", fontSize: "0.8em" }}>
            <span><span style={{ background: "rgba(239,68,68,0.18)", color: "#fca5a5", padding: "3px 10px", borderRadius: 20, fontWeight: 700, marginRight: 6 }}>‚ÜĎ OXIDISED</span>loses electrons, oxidation state increases</span>
            <span><span style={{ background: "rgba(59,130,246,0.18)", color: "#93c5fd", padding: "3px 10px", borderRadius: 20, fontWeight: 700, marginRight: 6 }}>‚Üď REDUCED</span>gains electrons, oxidation state decreases</span>
            <span style={{ color: "#64748b" }}>OIL RIG ‚ÄĒ Oxidation Is Loss, Reduction Is Gain (of electrons)</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
